name: Validate Phrase Candidates

on:
  push:
    paths:
      - 'candidates/**.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch current rules from KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          mkdir -p rules
          curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/rules" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -o rules/rules.json
          echo "Fetched rules v$(node -e "const r=require('./rules/rules.json');console.log(r.version)")"

      - name: Run validation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/validate.mjs

      - name: Push rules to Cloudflare KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/rules" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @rules/rules.json)
          if [ "$STATUS" != "200" ]; then
            echo "KV push failed with HTTP $STATUS"
            exit 1
          fi
          VERSION=$(node -e "const r=require('./rules/rules.json');console.log(r.version)")
          echo "Pushed rules v${VERSION} to Cloudflare KV"

      - name: Summary
        if: always()
        run: |
          echo "## Validation Run" >> $GITHUB_STEP_SUMMARY
          VERSION=$(node -e "const r=require('./rules/rules.json');console.log(r.version)" 2>/dev/null || echo "unknown")
          COUNT=$(node -e "const r=require('./rules/rules.json');console.log(r.signals.phraseMatch.phrases.length)" 2>/dev/null || echo "unknown")
          echo "- rules.json version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- Total phrases: $COUNT" >> $GITHUB_STEP_SUMMARY
